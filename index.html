<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>个人博客 - GopherTeen</title>
        <link rel="stylesheet" href="assets/css/style.css" />
    </head>
    <body>
        <!-- 顶部导航与切换按钮 -->
        <header class="site-header">
            <button id="theme-toggle" class="btn-toggle" aria-label="切换主题">🌙</button>
            <div class="clock" id="clock" aria-live="off"></div>
        </header>

        <!-- 站点介绍区域 -->
        <section class="hero-section">
            <h1 class="hero-title">GopherTeen</h1>

            <p class="hero-quote" id="quote"></p>
            <script>
                // 随机名言列表
                const quotes = [
                    "生活就像海洋，只有意志坚强的人才能到达彼岸。――马克思",
                    "成功的秘诀在于永不改变既定的目标。――乔治·桑",
                    "人生的价值，即以其人对于当代所做的工作为尺度。――徐玮",
                    "读书破万卷，下笔如有神。――杜甫",
                    "不积跬步，无以至千里；不积小流，无以成江海。――荀子",
                ];

                // 随机选择名言
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

                // 替换页面内容
                document.getElementById("quote").textContent = randomQuote;
            </script>
        </section>

        <!-- 文章区示例 -->
        <main class="content">
            <div id="post-list"></div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/marked@4.0.12/marked.min.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
